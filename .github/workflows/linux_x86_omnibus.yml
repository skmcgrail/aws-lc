name: linux-x86-omnibus
on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ '*' ]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true
env:
  GOPROXY: https://proxy.golang.org,direct
jobs:
  pre_push_checker:
    runs-on:
      - codebuild-aws-lc-ci-github-actions-${{ github.run_id }}-${{ github.run_attempt }}
        image:linux-5.0
        instance-size:small
        buildspec-override:true
    steps:
      - uses: actions/checkout@v5
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - uses: ./.github/actions/codebuild-docker-run
        name: Run Container
        with:
          image: ${{ steps.login-ecr.outputs.registry }}/aws-lc/ubuntu:20.04
          run: |
            source /opt/compiler-env/setup-clang-8.sh
            ./tests/check_objects_and_errors.sh
            ./tests/check_cmake_configure.sh
            go run ./tests/check_licenses.go
            ./tests/check_generated_src.sh
            ./tests/coding_guidelines/style.sh
            (cd util && go run ./doc.go)

  c99_cplusplus98_checker:
    runs-on:
      - codebuild-aws-lc-ci-github-actions-${{ github.run_id }}-${{ github.run_attempt }}
        image:linux-5.0
        instance-size:small
        buildspec-override:true
    steps:
      - uses: actions/checkout@v5
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - uses: ./.github/actions/codebuild-docker-run
        name: Run Container
        with:
          image: ${{ steps.login-ecr.outputs.registry }}/aws-lc/ubuntu:22.04
          run: |
            source /opt/compiler-env/setup-gcc-12.sh
            ./tests/coding_guidelines/c99_cplusplus98_test.sh

  posix_tests:
    name: posix-tests-${{ matrix.image }}-${{ matrix.compiler }}-${{ matrix.build32 && 'x86' || 'x86_64' }}
    runs-on:
      - codebuild-aws-lc-ci-github-actions-${{ github.run_id }}-${{ github.run_attempt }}
        image:linux-5.0
        instance-size:large
        buildspec-override:true
    strategy:
      fail-fast: false
      matrix:
        include:
          # AmazonLinux 2
          - image: amazonlinux:2
            compiler: clang-7
          - image: amazonlinux:2
            compiler: gcc-7

          # AmazonLinux 2023
          - image: amazonlinux:2023
            compiler: clang-15
          - image: amazonlinux:2023
            compiler: gcc-11

          # CentOS 7
          - image: centos:7
            compiler: gcc-4
            build32: 0
          - image: centos:7
            compiler: gcc-4
            build32: 1

          # CentOS 8
          - image: centos:8
            compiler: gcc-8

          # Fedora 31
          - image: fedora:31
            compiler: clang-9
            build32: 0

          # Ubuntu 16.04
          - image: ubuntu:16.04
            compiler: gcc-5
            build32: 1

          # Ubuntu 18.04
          - image: ubuntu:18.04
            compiler: clang-6
          - image: ubuntu:18.04
            compiler: gcc-7

          # Ubuntu 20.04
          - image: ubuntu:20.04
            compiler: clang-7
          - image: ubuntu:20.04
            compiler: clang-8
          - image: ubuntu:20.04
            compiler: clang-9
          - image: ubuntu:20.04
            compiler: clang-10
          - image: ubuntu:20.04
            compiler: gcc-7
          - image: ubuntu:20.04
            compiler: gcc-8

          # Ubuntu 22.04
          - image: ubuntu:22.04
            compiler: gcc-10
          - image: ubuntu:22.04
            compiler: gcc-11
          - image: ubuntu:22.04
            compiler: gcc-12
    steps:
      - uses: actions/checkout@v5
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - uses: ./.github/actions/codebuild-docker-run
        name: Run Container (${{ matrix.image }})
        env:
          AWSLC_32BIT: ${{ matrix.build32 || 0 }}
        with:
          image: ${{ steps.login-ecr.outputs.registry }}/aws-lc/${{ matrix.image }}
          env: |
            AWSLC_32BIT
          run: |
            source /opt/compiler-env/setup-${{ matrix.compiler }}.sh
            ./tests/ci/run_posix_tests.sh

  fips_tests:
    name: ${{ matrix.enableASAN && 'asan-' || '' }}fips-tests-${{ matrix.image }}
    runs-on:
      - codebuild-aws-lc-ci-github-actions-${{ github.run_id }}-${{ github.run_attempt }}
        image:linux-5.0
        instance-size:large
        buildspec-override:true
    strategy:
      fail-fast: false
      matrix:
        include:
          # AmazonLinux 2
          - image: amazonlinux:2
            compiler: clang-7
          - image: amazonlinux:2
            compiler: gcc-7

          # AmazonLinux 2023
          - image: amazonlinux:2023
            compiler: clang-15
          - image: amazonlinux:2023
            compiler: gcc-11

          # Centos 7
          - image: centos:7
            compiler: gcc-4
          
          # Centos 9
          - image: centos:8
            compiler: gcc-8

          # Ubuntu 18.04
          - image: ubuntu:18.04
            compiler: clang-6
          - image: ubuntu:18.04
            compiler: gcc-7

          # Ubuntu 20.04
          - image: ubuntu:20.04
            compiler: clang-7
            enableASAN: 1
          - image: ubuntu:20.04
            compiler: clang-8
          - image: ubuntu:20.04
            compiler: clang-9
          - image: ubuntu:20.04
            compiler: clang-10
          - image: ubuntu:20.04
            compiler: gcc-7
          - image: ubuntu:20.04
            compiler: gcc-8

          # Ubuntu 22.04
          - image: ubuntu:22.04
            compiler: gcc-10
          - image: ubuntu:22.04
            compiler: gcc-11
          - image: ubuntu:22.04
            compiler: gcc-12
    env:
      AWSLC_ENABLE_FIPS_ASAN: ${{ matrix.enableASAN || 0 }}
    steps:
      - uses: actions/checkout@v5
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - uses: ./.github/actions/codebuild-docker-run
        name: Run Container (${{ matrix.image }})
        with:
          image: ${{ steps.login-ecr.outputs.registry }}/aws-lc/${{ matrix.image }}
          env: |
            AWSLC_ENABLE_FIPS_ASAN
          run: |
            source /opt/compiler-env/setup-${{ matrix.compiler }}.sh
            ./tests/ci/run_fips_tests.sh

  prefix_tests:
    name: prefix-tests-${{ matrix.image }}
    runs-on:
      - codebuild-aws-lc-ci-github-actions-${{ github.run_id }}-${{ github.run_attempt }}
        image:linux-5.0
        instance-size:large
        buildspec-override:true
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: amazonlinux:2
            compiler: clang-7
          - image: ubuntu:22.04
            compiler: gcc-11
    steps:
      - uses: actions/checkout@v5
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - uses: ./.github/actions/codebuild-docker-run
        name: Run Container (${{ matrix.image }})
        with:
          image: ${{ steps.login-ecr.outputs.registry }}/aws-lc/${{ matrix.image }}
          run: |
            source /opt/compiler-env/setup-${{ matrix.compiler }}
            ./tests/ci/run_prefix_tests.sh

  sde_tests:
    name: sde-tests
    runs-on:
      - codebuild-aws-lc-ci-github-actions-${{ github.run_id }}-${{ github.run_attempt }}
        image:linux-5.0
        instance-size:2xlarge
        buildspec-override:true
    steps:
      - uses: actions/checkout@v5
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - uses: ./.github/actions/codebuild-docker-run
        name: Run Container
        with:
          image: ${{ steps.login-ecr.outputs.registry }}/aws-lc/amazonlinux:2_sde
          run: |
            source /opt/compiler-env/setup-gcc-7.sh
            ./tests/ci/run_tests_with_sde.sh
          options: --privileged

  asan_sde_tests:
    name: asan-sde-tests
    runs-on:
      - codebuild-aws-lc-ci-github-actions-${{ github.run_id }}-${{ github.run_attempt }}
        image:linux-5.0
        instance-size:2xlarge
        buildspec-override:true
    steps:
      - uses: actions/checkout@v5
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Get ECR Repoistory URL
        id: ecr
        run: echo AWS_ECR_REPO_LINUX_X86=${AWS_ECR_REPO_LINUX_X86} >> "$GITHUB_OUTPUT"
      - uses: ./.github/actions/codebuild-docker-run
        name: Run Container
        with:
          image: ${{ steps.login-ecr.outputs.registry }}/aws-lc/ubuntu:22.04_sde
          run: |
            source /opt/compiler-env/setup-clang-14.sh
            ./tests/ci/run_tests_with_sde_asan.sh
          options: --privileged

  valgrind:
    name: valgrind
    runs-on:
      - codebuild-aws-lc-ci-github-actions-${{ github.run_id }}-${{ github.run_attempt }}
        image:linux-5.0
        instance-size:large
        buildspec-override:true
    env:
      AWS_LC_GO_TEST_TIMEOUT: 60m
    steps:
      - uses: actions/checkout@v5
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - uses: ./.github/actions/codebuild-docker-run
        name: Run Container
        with:
          image: ${{ steps.login-ecr.outputs.registry }}/aws-lc/amazonlinux:2023
          env: |
            AWS_LC_GO_TEST_TIMEOUT
          run: |
            source /opt/compiler-env/setup-gcc-11.sh
            ./tests/ci/run_valgrind_tests.sh

  valgrind-ssl-runner-part1:
    runs-on:
      - codebuild-aws-lc-ci-github-actions-${{ github.run_id }}-${{ github.run_attempt }}
        image:linux-5.0
        instance-size:2xlarge
        buildspec-override:true
    env:
      AWS_LC_GO_TEST_TIMEOUT: 60m
      AWS_LC_SSL_RUNNER_END_INDEX: 4000
    steps:
      - uses: actions/checkout@v5
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - uses: ./.github/actions/codebuild-docker-run
        name: Run Container
        with:
          image: ${{ steps.login-ecr.outputs.registry }}/aws-lc/amazonlinux:2023
          env: |
            AWS_LC_GO_TEST_TIMEOUT
            AWS_LC_SSL_RUNNER_END_INDEX
          run: |
            source /opt/compiler-env/setup-gcc-11.sh
            ./tests/ci/run_ssl_runner_valgrind_tests.sh
          options: --privileged

  valgrind-ssl-runner-part2:
    runs-on:
      - codebuild-aws-lc-ci-github-actions-${{ github.run_id }}-${{ github.run_attempt }}
        image:linux-5.0
        instance-size:2xlarge
        buildspec-override:true
    env:
      AWS_LC_GO_TEST_TIMEOUT: 60m
      AWS_LC_SSL_RUNNER_START_INDEX: 4001
    steps:
      - uses: actions/checkout@v5
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Get ECR Repoistory URL
        id: ecr
        run: echo AWS_ECR_REPO_LINUX_X86=${AWS_ECR_REPO_LINUX_X86} >> "$GITHUB_OUTPUT"
      - uses: ./.github/actions/codebuild-docker-run
        name: Run Container
        with:
          image: ${{ steps.login-ecr.outputs.registry }}/aws-lc/amazonlinux:2023
          env: |
            AWS_LC_GO_TEST_TIMEOUT
            AWS_LC_SSL_RUNNER_START_INDEX
          run: |
            source /opt/compiler-env/setup-gcc-11.sh
            ./tests/ci/run_ssl_runner_valgrind_tests.sh
          options: --privileged

  sanitizers:
    runs-on:
      - codebuild-aws-lc-ci-github-actions-${{ github.run_id }}-${{ github.run_attempt }}
        image:linux-5.0
        instance-size:large
        buildspec-override:true
    env:
      AWS_LC_GO_TEST_TIMEOUT: '45m'
    steps:
      - uses: actions/checkout@v5
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - uses: ./.github/actions/codebuild-docker-run
        name: Run Container
        with:
          image: ${{ steps.login-ecr.outputs.registry }}/aws-lc/amazonlinux:2023
          env: |
            AWS_LC_GO_TEST_TIMEOUT
          run: |
            source /opt/compiler-env/setup-clang-15.sh
            ./tests/ci/run_posix_sanitizers.sh

  install_shared_and_static:
    runs-on:
      - codebuild-aws-lc-ci-github-actions-${{ github.run_id }}-${{ github.run_attempt }}
        image:linux-5.0
        instance-size:small
        buildspec-override:true
    steps:
      - uses: actions/checkout@v5
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - uses: ./.github/actions/codebuild-docker-run
        name: Run Container
        with:
          image: ${{ steps.login-ecr.outputs.registry }}/aws-lc/ubuntu:20.04
          run: |
            source /opt/compiler-env/setup-clang-9.sh
            ./tests/ci/run_install_shared_and_static.sh

  # We parallel the quick check proof scripts.
  # Since each proof script takes around 7GB of memory, this results in a high demand for memory.
  # Current benchmarks show running quick check using 8 processes can consume more than 55 GB of memory.
  # Therefore, BUILD_GENERAL1_2XLARGE (72 vCPUs, 145 GB memory) is selected for quick check.
  # SAW proofs on platform X86_64
  formal_verification:
    name: fv-${{ matrix.name }}
    runs-on:
      - codebuild-aws-lc-ci-github-actions-${{ github.run_id }}-${{ github.run_attempt }}
        image:linux-5.0
        instance-size:${{ matrix.size }}
        buildspec-override:true
    strategy:
      fail-fast: false
      matrix:
        include:
          # We parallel the quick check proof scripts.
          # Since each proof script takes around 7GB of memory, this results in a high demand for memory.
          # Current benchmarks show running quick check using 8 processes can consume more than 55 GB of memory.
          # Therefore, BUILD_GENERAL1_2XLARGE (72 vCPUs, 145 GB memory) is selected for quick check.
          # SAW proofs on platform X86_64
          - name: saw-x86_64
            image: ubuntu-20.04_clang-10x_formal-verification-saw-x86_64_latest
            size: 2xlarge
            entry: SAW/scripts/x86_64/docker_entrypoint.sh

          # SAW proof for AES-GCM on platform x86
          - name: saw-x86_64-aes-gcm
            image: ubuntu-20.04_clang-10x_formal-verification-saw-x86_64-aes-gcm_latest
            size: xlarge
            entry: SAW/scripts/x86_64/docker_entrypoint_aes_gcm.sh

          # SAW proofs on platform AArch64
          - name: saw-aarch64
            image: ubuntu-20.04_clang-10x_formal-verification-saw-aarch64_latest
            size: 2xlarge
            entry: SAW/scripts/aarch64/docker_entrypoint.sh

          - name: nysym-aarch64
            image: ubuntu-22.04_clang-14x_formal-verification-nsym-aarch64_latest
            size: 2xlarge
            entry: NSym/scripts/docker_entrypoint.sh

          # NSym proofs on platform AArch64
    steps:
      - uses: actions/checkout@v5
      - name: Get ECR Repoistory URL
        id: ecr
        run: echo AWS_ECR_REPO_LINUX_X86=${AWS_ECR_REPO_LINUX_X86} >> "$GITHUB_OUTPUT"
      - uses: ./.github/actions/codebuild-docker-run
        name: Run Container (${{ matrix.image }})
        with:
          image: ${{ steps.ecr.outputs.AWS_ECR_REPO_LINUX_X86 }}:${{ matrix.image }}
          run: ./tests/ci/run_formal_verification.sh ${{ matrix.entry }}
          options: --privileged

  # Build and test aws-lc without Perl/Go.
  minimal_tests:
    name: minimal-${{ matrix.image }}
    runs-on:
      - codebuild-aws-lc-ci-github-actions-${{ github.run_id }}-${{ github.run_attempt }}
        image:linux-5.0
        instance-size:small
        buildspec-override:true
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: amazonlinux:2
            compiler: gcc-7
          - image: centos:7
            compiler: gcc-4
          - image: ubuntu:16.04
            compiler: gcc-5
          - image: ubuntu:18.04
            compiler: clang-6
          - image: ubuntu:20.04
            compiler: clang-8
          - image: ubuntu:20.04
            compiler: clang-9
          - image: ubuntu:20.04
            compiler: gcc-7
          - image: ubuntu:20.04
            compiler: gcc-8
    steps:
      - uses: actions/checkout@v5
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - uses: ./.github/actions/codebuild-docker-run
        name: Run Container (${{ matrix.image }})
        with:
          image: ${{ steps.login-ecr.outputs.registry }}/aws-lc/${{ matrix.image }}
          run: |
            source /opt/compiler-env/setup-${{ matrix.compiler }}.sh
            ./tests/ci/run_minimal_tests.sh

  benchmark:
    runs-on:
      - codebuild-aws-lc-ci-github-actions-${{ github.run_id }}-${{ github.run_attempt }}
        image:linux-5.0
        instance-size:large
        buildspec-override:true
    steps:
      - uses: actions/checkout@v5
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - uses: ./.github/actions/codebuild-docker-run
        name: Run POSIX tests
        with:
          image: ${{ steps.login-ecr.outputs.registry }}:amazonlinux:2023
          run: |
            source /opt/compiler-env/setup-clang-15.sh
            ./tests/ci/run_benchmark_build_tests.sh

  legacy_build:
    runs-on:
      - codebuild-aws-lc-ci-github-actions-${{ github.run_id }}-${{ github.run_attempt }}
        image:linux-5.0
        instance-size:small
        buildspec-override:true
    steps:
      - uses: actions/checkout@v5
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - uses: ./.github/actions/codebuild-docker-run
        name: Run Container
        with:
          image: ${{ steps.login-ecr.outputs.registry }}/aws-lc/ubuntu:10.04
          run: |
            source /opt/compiler-env/setup-gcc-4.1.sh
            ./tests/ci/run_legacy_build.sh

  fips_callback:
    name: fips-callback-${{ matrix.image }}
    runs-on:
      - codebuild-aws-lc-ci-github-actions-${{ github.run_id }}-${{ github.run_attempt }}
        image:linux-5.0
        instance-size:large
        buildspec-override:true
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: amazonlinux:2
            compiler: gcc-7
          - image: amazonlinux:2023
            compiler: gcc-11
    steps:
      - uses: actions/checkout@v5
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - uses: ./.github/actions/codebuild-docker-run
        name: Run Container (${{ matrix.image }})
        with:
          image: ${{ steps.login-ecr.outputs.registry }}/aws-lc/${{ matrix.image }}
          run: |
            source /opt/compiler-env/setup-${{ matrix.compiler }}.sh
            ./tests/ci/run_fips_callback_tests.sh
